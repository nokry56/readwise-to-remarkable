<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Book/tablet shape (reMarkable) -->
  <rect x="60" y="42" width="100" height="136" rx="8" fill="#334155" stroke="#475569" stroke-width="2"/>
  <rect x="68" y="50" width="84" height="120" rx="4" fill="#1e293b"/>

  <!-- Text lines on the page -->
  <rect x="78" y="64" width="64" height="4" rx="2" fill="#475569"/>
  <rect x="78" y="76" width="58" height="4" rx="2" fill="#475569"/>
  <rect x="78" y="88" width="62" height="4" rx="2" fill="#475569"/>

  <!-- Highlight bar (yellow) over a line -->
  <rect x="76" y="99" width="52" height="12" rx="3" fill="url(#highlight)" opacity="0.85"/>
  <rect x="78" y="102" width="48" height="4" rx="2" fill="#1e293b" opacity="0.3"/>

  <rect x="78" y="118" width="56" height="4" rx="2" fill="#475569"/>
  <rect x="78" y="130" width="50" height="4" rx="2" fill="#475569"/>
  <rect x="78" y="142" width="60" height="4" rx="2" fill="#475569"/>

  <!-- Sync arrows (circular) -->
  <!-- Arrow going right/down -->
  <path d="M 160 140 C 195 140, 210 160, 210 180 C 210 200, 195 215, 175 215"
        fill="none" stroke="url(#arrow)" stroke-width="7" stroke-linecap="round"/>
  <polygon points="170,205 175,220 185,210" fill="#60a5fa"/>

  <!-- Arrow going left/up -->
  <path d="M 175 225 C 155 225, 140 215, 140 200 C 140 185, 150 175, 160 172"
        fill="none" stroke="url(#arrow)" stroke-width="7" stroke-linecap="round"/>
  <polygon points="165,182 160,167 150,177" fill="#60a5fa"/>

  <!-- Small "R" badge for Readwise -->
  <circle cx="195" cy="65" r="24" fill="#ef4444"/>
  <text x="195" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="28" fill="white">R</text>
</svg>
